<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<title>The Nucleo · Propuesta de socios</title>
<style>
:root{
  --bg:#171717;
  --bg-card:rgba(30,30,30,.85);
  --card-solid:#1e1e1e;
  --border:#2a2a2a;
  --border-hover:#3a3a3a;
  --text:#E8EAE9;
  --text-bright:#ffffff;
  --subtle:#c8c8c8;
  --muted:#8a8a8a;
  --yellow:#F3F959;
  --yellow-dim:rgba(243,249,89,.10);
  --yellow-glow:rgba(243,249,89,.25);
  --accent:#C7B299;
  --accent-dim:rgba(199,178,153,.12);
  --green:#22c55e;
  --green-dim:rgba(34,197,94,.12);
  --red:#ef4444;
  --orange:#f59e0b;
  --orange-dim:rgba(245,158,11,.12);
  --ease:cubic-bezier(.16,1,.3,1);
  --maxw:1180px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow:hidden;
}

/* ---------- barra de progreso ---------- */
#progress{
  position:fixed;top:0;left:0;height:3px;width:0;z-index:60;
  background:linear-gradient(90deg,var(--yellow),var(--accent));
  box-shadow:0 0 12px var(--yellow-glow);
  transition:width .5s var(--ease);
}

/* ---------- escenario / slides ---------- */
#stage{position:relative;width:100vw;height:100vh}
.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;justify-content:center;
  padding:clamp(30px,4.6vw,64px) clamp(32px,7vw,110px);
  opacity:0;visibility:hidden;transform:translateY(24px) scale(.99);
  transition:opacity .5s var(--ease),transform .6s var(--ease),visibility .5s;
  overflow:hidden;
}
.slide.is-active{opacity:1;visibility:visible;transform:none}
/* aura difusa de marca */
.slide::before{
  content:"";position:absolute;top:-20%;right:-10%;width:60vw;height:60vw;
  background:radial-gradient(circle,var(--yellow-dim),transparent 62%);
  pointer-events:none;z-index:0;
}
.slide > *{position:relative;z-index:1}
.slide .wrap{width:100%;max-width:var(--maxw);margin:0 auto}

/* numero gigante de marca de agua */
.ghost-n{
  position:absolute;right:clamp(24px,5vw,80px);bottom:clamp(8px,4vw,40px);
  font-size:clamp(120px,26vw,360px);font-weight:800;line-height:.8;
  color:#fff;opacity:.025;z-index:0;letter-spacing:-.04em;user-select:none;
}

/* ---------- piezas de contenido ---------- */
.kicker{
  display:inline-flex;align-items:center;gap:9px;
  font-size:clamp(12px,1.4vw,14px);font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;color:var(--accent);
  background:var(--accent-dim);border:1px solid rgba(199,178,153,.22);
  padding:7px 15px;border-radius:100px;margin-bottom:clamp(20px,3vw,34px);
}
.kicker .dot{width:7px;height:7px;border-radius:50%;background:var(--yellow);
  box-shadow:0 0 0 0 var(--yellow-glow);animation:pulse 2.4s var(--ease) infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.titular{
  font-size:clamp(25px,3.4vw,42px);font-weight:800;line-height:1.07;
  letter-spacing:-.02em;color:var(--text-bright);max-width:26ch;
}
.subtitulo{
  font-size:clamp(15px,1.7vw,19px);font-weight:500;color:var(--subtle);
  line-height:1.45;margin-top:clamp(12px,1.6vw,18px);max-width:54ch;
}
.destacado{
  margin-top:clamp(12px,1.8vw,20px);
  border-left:3px solid var(--yellow);
  background:var(--yellow-dim);
  padding:11px 16px;border-radius:0 12px 12px 0;
  font-size:clamp(14px,1.6vw,18px);font-weight:600;color:var(--text-bright);
  max-width:60ch;
}

/* listas */
.bullets{margin-top:clamp(24px,3.4vw,40px);display:flex;flex-direction:column;gap:clamp(12px,1.5vw,17px);max-width:60ch}
.bullets li{
  list-style:none;display:flex;gap:14px;align-items:flex-start;
  font-size:clamp(14.5px,1.7vw,19px);line-height:1.4;color:var(--text);
}
.bullets li .mk{
  flex:0 0 auto;width:9px;height:9px;margin-top:.45em;border-radius:2px;
  background:var(--yellow);transform:rotate(45deg);
}
.bullets li.is-ph .mk{background:var(--orange)}
.bullets li.is-bad .mk{background:var(--red);opacity:.65}

/* grid (solucion / mercado) */
.grid{margin-top:clamp(16px,2.2vw,28px);display:grid;gap:clamp(12px,1.5vw,18px);
  grid-template-columns:repeat(3,1fr)}
.grid .card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:16px;
  padding:clamp(18px,2vw,26px);backdrop-filter:blur(12px);
}
.grid .card h3{font-size:clamp(15px,1.7vw,19px);font-weight:700;color:var(--yellow);margin-bottom:8px;letter-spacing:-.01em}
.grid .card p{font-size:clamp(13.5px,1.5vw,16px);color:var(--subtle);line-height:1.45}
.grid .card.is-ph h3{color:var(--orange)}

/* pills de estado inline */
.st{display:inline-block;font-size:.62em;font-weight:700;letter-spacing:.08em;
  vertical-align:middle;padding:3px 8px;border-radius:100px;margin-left:6px;transform:translateY(-1px)}
.st-vivo{color:var(--green);background:var(--green-dim);border:1px solid rgba(34,197,94,.3)}
.st-curso{color:var(--orange);background:var(--orange-dim);border:1px solid rgba(245,158,11,.3)}
.ph-inline{color:var(--orange);font-style:italic;font-weight:500}

/* badge "por completar" en slide placeholder */
.badge-ph{
  display:inline-flex;align-items:center;gap:8px;align-self:flex-start;
  font-size:clamp(11px,1.2vw,13px);font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--orange);background:var(--orange-dim);border:1px dashed rgba(245,158,11,.45);
  padding:5px 12px;border-radius:100px;margin-bottom:10px;
}

/* ---------- portada ---------- */
.slide[data-tipo="cover"]{align-items:center;text-align:center}
.slide[data-tipo="cover"] .wrap{max-width:980px}
.wordmark{font-size:clamp(54px,12vw,148px);font-weight:800;letter-spacing:-.045em;
  line-height:.9;color:var(--text-bright)}
.wordmark .the{color:var(--accent);font-weight:600}
.wordmark .pt{color:var(--yellow)}
.slide[data-tipo="cover"] .kicker{margin:0 auto clamp(26px,4vw,40px)}
.slide[data-tipo="cover"] .subtitulo{margin:clamp(22px,3vw,30px) auto 0;text-align:center;max-width:40ch;font-size:clamp(17px,2.2vw,25px);color:var(--text)}
.live-pill{
  display:inline-flex;align-items:center;gap:10px;margin-top:clamp(26px,3.5vw,38px);
  font-size:clamp(13px,1.5vw,16px);font-weight:600;color:var(--green);
  background:var(--green-dim);border:1px solid rgba(34,197,94,.3);
  padding:10px 20px;border-radius:100px;
}
.live-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 12px var(--green);animation:pulse 2s var(--ease) infinite}
.slide[data-tipo="cover"] .bullets{margin:clamp(30px,4vw,46px) auto 0;max-width:54ch;text-align:left}

/* ---------- cierre ---------- */
.slide[data-tipo="cierre"]::before,.slide[data-tipo="socios"]::before{
  background:radial-gradient(circle,var(--green-dim),transparent 62%)}

/* ---------- footer / chrome ---------- */
.footer{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  display:flex;justify-content:space-between;align-items:center;
  padding:14px clamp(24px,5vw,48px);font-size:12px;color:var(--muted);
  letter-spacing:.04em;pointer-events:none;
}
.footer .brand b{color:var(--subtle);font-weight:600}
.counter{font-variant-numeric:tabular-nums}
.counter b{color:var(--yellow);font-weight:700}

/* dots */
.dots{position:fixed;left:50%;bottom:46px;transform:translateX(-50%);z-index:55;
  display:flex;gap:9px;pointer-events:auto}
.dots button{width:8px;height:8px;border-radius:50%;border:0;cursor:pointer;padding:0;
  background:#3a3a3a;transition:.3s var(--ease)}
.dots button.on{background:var(--yellow);width:22px;border-radius:100px}

/* flechas */
.nav{position:fixed;top:50%;transform:translateY(-50%);z-index:55;
  width:46px;height:46px;border-radius:50%;border:1px solid var(--border);
  background:rgba(20,20,20,.6);color:var(--subtle);cursor:pointer;
  font-size:20px;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);transition:.25s var(--ease)}
.nav:hover{border-color:var(--yellow);color:var(--yellow);transform:translateY(-50%) scale(1.08)}
.nav.prev{left:clamp(12px,2vw,26px)}
.nav.next{right:clamp(12px,2vw,26px)}
.nav:disabled{opacity:.25;cursor:default}

/* ayuda / hint */
.hint{position:fixed;right:clamp(16px,3vw,30px);top:18px;z-index:55;
  font-size:11px;color:var(--muted);letter-spacing:.05em;text-align:right;line-height:1.7}
.hint kbd{background:#252525;border:1px solid var(--border);border-radius:5px;
  padding:1px 6px;font-family:var(--font);font-size:10px;color:var(--subtle)}

/* notas del editor (ocultas por defecto) */
.slide-nota{display:none}
body.show-notas .slide-nota{
  display:block;margin-top:22px;max-width:62ch;
  font-size:13px;line-height:1.5;color:var(--orange);
  background:var(--orange-dim);border:1px dashed rgba(245,158,11,.4);
  border-radius:10px;padding:12px 16px;
}
.slide-nota b{color:var(--orange)}
.notas-flag{position:fixed;left:clamp(16px,3vw,30px);top:16px;z-index:55;display:none;
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--orange)}
body.show-notas .notas-flag{display:block}

/* ---------- responsive ---------- */
@media (max-width:720px){
  .grid{grid-template-columns:1fr}
  .nav{display:none}
  .titular{max-width:none}
}

/* ---------- beneficios (matriz socios) ---------- */
.slide[data-tipo="beneficios"],.slide[data-tipo="aportaciones"],.slide[data-tipo="vesting"],.slide[data-tipo="recorrido"]{padding-top:clamp(34px,4.4vw,50px);padding-bottom:clamp(26px,3.4vw,42px)}
.slide[data-tipo="beneficios"]::before{background:radial-gradient(circle,var(--accent-dim),transparent 62%)}
.benx{margin-top:clamp(14px,2vw,24px);display:flex;flex-direction:column;
  border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--bg-card)}
.benx-row{display:grid;grid-template-columns:208px 1fr 1fr;border-top:1px solid var(--border)}
.benx-row:first-child{border-top:0}
.benx-head{background:rgba(255,255,255,.018)}
.bx-rail{padding:12px 16px;display:flex;flex-direction:column;gap:2px;justify-content:center;
  border-right:1px solid var(--border);background:rgba(255,255,255,.012)}
.bx-mono{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;color:var(--text-bright);background:var(--card-solid);
  border:1px solid var(--border-hover);margin-bottom:5px}
.bx-rol{font-size:12.5px;font-weight:700;color:var(--text-bright);letter-spacing:.01em}
.bx-persona{font-size:10.5px;color:var(--muted)}
.bx-cell{padding:11px 16px;display:flex;flex-direction:column;gap:6px;justify-content:center;border-right:1px solid var(--border)}
.bx-cell:last-child{border-right:0}
.bx-h{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.benx-head .bx-rail{background:transparent}
.bx-li{position:relative;padding-left:15px;font-size:11.5px;line-height:1.34;color:var(--text)}
.bx-md .bx-li{color:var(--subtle)}
.bx-li::before{content:'';position:absolute;left:0;top:5px;width:5px;height:5px;border-radius:1px;
  background:var(--accent);transform:rotate(45deg)}
.bx-md .bx-li::before{background:var(--border-hover)}
.bx-li b{color:var(--text-bright);font-weight:600}
.benx-foot{margin-top:13px;display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--subtle)}
.benx-foot .bx-bar{width:20px;height:2px;border-radius:2px;background:var(--yellow);
  box-shadow:0 0 8px var(--yellow-glow);flex:0 0 20px}
.benx-foot b{color:var(--yellow);font-weight:700}

/* ---------- punto de inflexión (timeline) ---------- */
.slide[data-tipo="inflexion"]{padding-top:clamp(38px,5vw,64px)}
.slide[data-tipo="inflexion"]::before{background:radial-gradient(circle,var(--yellow-dim),transparent 62%)}
.infx{margin-top:clamp(28px,3.6vw,46px);display:grid;grid-template-columns:repeat(3,1fr);
  gap:clamp(18px,2vw,30px);position:relative}
.infx::before{content:'';position:absolute;top:9px;left:9%;right:9%;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--yellow),var(--accent));opacity:.45}
.infx-step{position:relative;display:flex;flex-direction:column;gap:9px;padding-top:32px}
.ix-node{position:absolute;top:0;left:0;width:20px;height:20px;border-radius:50%;
  background:var(--card-solid);border:2px solid var(--accent)}
.infx-step.is-pivot .ix-node{border-color:var(--yellow);background:var(--yellow);box-shadow:0 0 14px var(--yellow-glow)}
.ix-when{font-size:11px;letter-spacing:.03em;color:var(--muted);font-weight:600}
.ix-label{font-size:clamp(16px,1.9vw,22px);font-weight:700;color:var(--text-bright);letter-spacing:-.01em;line-height:1.12}
.infx-step.is-pivot .ix-when,.infx-step.is-pivot .ix-label{color:var(--yellow)}
.ix-text{font-size:clamp(12.5px,1.4vw,15px);line-height:1.46;color:var(--subtle)}

/* ---------- grid 2 columnas (contenido) ---------- */
.grid.g2{grid-template-columns:repeat(2,1fr);gap:clamp(10px,1.2vw,15px)}
.grid.g2 .card{padding:clamp(11px,1.3vw,15px) clamp(14px,1.6vw,18px)}
.grid.g2 .card h3{font-size:clamp(14px,1.5vw,17px)}
.grid.g2 .card p{font-size:clamp(12.5px,1.4vw,14.5px);line-height:1.4}

/* ---------- cover ---------- */
.wordmark.sm{font-size:clamp(20px,2.8vw,32px);line-height:1;margin:0 auto clamp(16px,2.2vw,24px)}
.slide[data-tipo="cover"] .cover-title{max-width:20ch;margin:0 auto;font-size:clamp(28px,4vw,48px)}
.slide[data-tipo="cover"] .bullets{display:none}
.slide[data-tipo="beneficios"] .titular,.slide[data-tipo="inflexion"] .titular,.slide[data-tipo="escaleras"] .titular,.slide[data-tipo="aportaciones"] .titular,.slide[data-tipo="vesting"] .titular{font-size:clamp(20px,2.5vw,30px);max-width:40ch}
.slide[data-tipo="beneficios"] .destacado,.slide[data-tipo="inflexion"] .destacado,.slide[data-tipo="escaleras"] .destacado,.slide[data-tipo="aportaciones"] .destacado{display:none}

/* ---------- escaleras (punto de inflexión por perfil) ---------- */
.slide[data-tipo="escaleras"]{padding-top:clamp(32px,4.2vw,52px);padding-bottom:clamp(24px,3.2vw,40px)}
.slide[data-tipo="escaleras"]::before{background:radial-gradient(circle,var(--yellow-dim),transparent 62%)}
.escx{margin-top:clamp(14px,2vw,24px);display:flex;flex-direction:column;gap:clamp(10px,1.3vw,15px)}
.escx-row{display:grid;grid-template-columns:198px 1fr;gap:14px;align-items:center;
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:11px 16px}
.escx-row.is-key{border-color:var(--border-hover)}
.escx-row:not(.is-key){opacity:.82}
.ex-rail{display:flex;align-items:center;gap:11px;min-width:0}
.ex-mono{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;color:var(--text-bright);background:var(--card-solid);border:1px solid var(--border-hover);flex:0 0 30px}
.escx-row.is-key .ex-mono{border-color:rgba(243,249,89,.32);color:var(--yellow)}
.ex-info{display:flex;flex-direction:column;gap:1px;min-width:0}
.ex-rol{font-size:13px;font-weight:700;color:var(--text-bright);letter-spacing:.01em}
.ex-persona{font-size:10.5px;color:var(--muted)}
.ex-track{display:flex;align-items:stretch;gap:7px;justify-content:flex-start}
.ex-arrow{display:flex;align-items:center;color:var(--muted);font-size:15px;flex:0 0 auto}
.ex-chip{flex:1 1 0;max-width:230px;min-width:0;display:flex;flex-direction:column;gap:2px;
  background:rgba(255,255,255,.022);border:1px solid var(--border);border-radius:10px;padding:8px 11px}
.ex-lab{font-size:11.5px;font-weight:700;color:var(--text);line-height:1.2}
.ex-sub{font-size:10.5px;color:var(--muted);line-height:1.28}
.ex-chip.is-on{background:var(--yellow-dim);border-color:rgba(243,249,89,.42);box-shadow:0 0 0 1px rgba(243,249,89,.12)}
.ex-chip.is-on .ex-lab{color:var(--yellow)}
.ex-chip.is-on .ex-sub{color:var(--subtle)}
.escx-foot{margin-top:clamp(12px,1.6vw,18px);font-size:11.5px;color:var(--muted);line-height:1.45;max-width:74ch}

/* ---------- comisiones de referido ---------- */
.slide[data-tipo="comisiones"]::before{background:radial-gradient(circle,var(--accent-dim),transparent 62%)}
.com-wrap{margin-top:clamp(18px,2.4vw,30px);display:grid;grid-template-columns:1.5fr 1fr;gap:clamp(18px,2vw,30px);align-items:start}
.com-main{display:flex;flex-direction:column;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:clamp(16px,1.8vw,24px)}
.com-h{font-size:13px;font-weight:700;color:var(--text-bright);margin-bottom:16px;line-height:1.3}
.com-tier{display:grid;grid-template-columns:160px 1fr;gap:14px;align-items:center;margin-bottom:11px}
.com-tier:last-of-type{margin-bottom:0}
.com-tier .rango{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.25}
.com-bartrack{position:relative;height:34px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.com-bar{position:absolute;left:0;top:0;bottom:0;border-radius:7px;display:flex;align-items:center;
  padding-left:13px;font-weight:800;font-size:15px;color:#171717;background:var(--accent)}
.com-tier.is-top .com-bar{background:var(--yellow);box-shadow:0 0 14px var(--yellow-glow)}
.com-note{margin-top:14px;padding-top:13px;border-top:1px solid var(--border);font-size:12px;line-height:1.5;color:var(--muted)}
.com-side{display:flex;flex-direction:column;gap:12px}
.com-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.com-card-h{font-size:13.5px;font-weight:700;color:var(--text-bright);display:flex;flex-direction:column;gap:3px;margin-bottom:7px}
.com-card-h span{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.com-card-t{font-size:12.5px;line-height:1.42;color:var(--subtle)}

/* ---------- aportaciones (capital cell) ---------- */
.bx-cap{font-size:13px;font-weight:600;color:var(--text);line-height:1.35}

/* ---------- vesting (distribución del equity) ---------- */
.slide[data-tipo="vesting"]::before{background:radial-gradient(circle,var(--yellow-dim),transparent 62%)}
.vx-key{display:flex;gap:20px;margin-top:clamp(12px,1.6vw,18px);font-size:11.5px;color:var(--muted)}
.vx-key span{display:inline-flex;align-items:center;gap:7px}
.vx-sw{width:12px;height:12px;border-radius:3px;display:inline-block}
.vx-sw-now{background:var(--yellow)}
.vx-sw-hito{background:rgba(199,178,153,.28);border:1px solid rgba(199,178,153,.5)}
.vstx{margin-top:clamp(12px,1.6vw,20px);display:flex;flex-direction:column;gap:clamp(11px,1.4vw,16px)}
.vstx-row{display:grid;grid-template-columns:196px 1fr;gap:16px;align-items:center}
.vx-rail{display:flex;align-items:center;gap:11px;min-width:0}
.vx-barwrap{display:flex;flex-direction:column;gap:6px;min-width:0}
.vx-bar{position:relative;height:30px;border-radius:8px;background:rgba(199,178,153,.22);
  border:1px solid rgba(199,178,153,.35);display:flex;align-items:center;overflow:hidden}
.vx-imm{position:absolute;left:0;top:0;bottom:0;background:var(--yellow);opacity:.9}
.vx-final{position:relative;z-index:1;margin-left:auto;padding-right:12px;font-weight:800;font-size:14px;color:var(--text-bright)}
.vx-legend{font-size:11px;color:var(--muted);line-height:1.3}
.vx-legend b{color:var(--subtle);font-weight:700}
.vx-foot{margin-top:14px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--subtle)}
.vx-foot .bx-bar{width:20px;height:2px;border-radius:2px;background:var(--yellow);box-shadow:0 0 8px var(--yellow-glow);flex:0 0 20px}

/* ---------- recorrido por socio (empieza · evoluciona · termina) ---------- */
.slide[data-tipo="recorrido"]::before{background:radial-gradient(circle,var(--accent-dim),transparent 62%)}
.rec{margin-top:clamp(18px,2.4vw,30px);display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(16px,1.9vw,26px)}
.rec-card{position:relative;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;
  padding:clamp(16px,1.9vw,24px);display:flex;flex-direction:column;gap:9px}
.rec-card:not(:last-child)::after{content:'›';position:absolute;right:calc(-1 * clamp(16px,1.9vw,26px) / 2 - 4px);
  top:50%;transform:translateY(-50%);color:var(--muted);font-size:20px;font-weight:700;z-index:2}
.rec-fase{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.rec-que{font-size:clamp(15px,1.7vw,19px);font-weight:700;color:var(--text-bright);line-height:1.22}
.rec-por{font-size:clamp(12.5px,1.4vw,14.5px);line-height:1.46;color:var(--subtle)}
.rec-card.is-end{border-color:rgba(243,249,89,.35);background:var(--yellow-dim);box-shadow:0 0 0 1px rgba(243,249,89,.1)}
.rec-card.is-end .rec-fase,.rec-card.is-end .rec-que{color:var(--yellow)}

/* ---------- calculadora de equity (sliders en vivo) ---------- */
.slide[data-tipo="calculadora"]{padding-top:clamp(30px,4vw,48px);padding-bottom:clamp(22px,3vw,38px)}
.slide[data-tipo="calculadora"]::before{background:radial-gradient(circle,var(--yellow-dim),transparent 62%)}
.slide[data-tipo="calculadora"] .titular{font-size:clamp(20px,2.5vw,30px);max-width:40ch}
.calc{margin-top:clamp(14px,2vw,24px);display:grid;grid-template-columns:1fr 1.12fr;gap:clamp(20px,2.6vw,40px);align-items:start}
.calc-controls{display:flex;flex-direction:column;gap:clamp(8px,1.1vw,13px)}
.calc-ctrl{display:flex;flex-direction:column;gap:6px}
.calc-ctrl-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.calc-dim{font-size:12.5px;font-weight:600;color:var(--text)}
.calc-w{font-size:11px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;flex:0 0 auto}
.calc-slider{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:5px;background:var(--border-hover);outline:none;cursor:pointer}
.calc-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:var(--yellow);box-shadow:0 0 8px var(--yellow-glow);border:0;cursor:pointer}
.calc-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--yellow);border:0;cursor:pointer}
.calc-bars{display:flex;flex-direction:column;gap:clamp(10px,1.4vw,16px)}
.calc-barrow{display:grid;grid-template-columns:148px 1fr;gap:12px;align-items:center}
.calc-rail{display:flex;align-items:center;gap:10px;min-width:0}
.calc-track{position:relative;height:34px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.calc-fill{position:absolute;left:0;top:0;bottom:0;border-radius:7px;background:linear-gradient(90deg,var(--accent),var(--yellow));transition:width .25s var(--ease)}
.calc-obj{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--text-bright);opacity:.85;z-index:2}
.calc-obj::after{content:'';position:absolute;top:-3px;left:-2px;width:6px;height:6px;border-radius:50%;background:var(--text-bright)}
.calc-pct{position:absolute;right:11px;top:50%;transform:translateY(-50%);z-index:3;font-weight:800;font-size:14px;color:var(--text-bright);font-variant-numeric:tabular-nums;text-shadow:0 1px 4px rgba(0,0,0,.7)}
.calc-legend{margin-top:10px;font-size:10.5px;color:var(--muted);display:flex;align-items:center;gap:8px}
.calc-legend i{width:2px;height:12px;background:var(--text-bright);display:inline-block;border-radius:2px}
.calc-foot{margin-top:clamp(12px,1.6vw,18px);display:flex;align-items:flex-start;gap:10px;font-size:11.5px;color:var(--subtle);line-height:1.45;max-width:96ch}
.calc-foot .bx-bar{width:20px;height:2px;border-radius:2px;background:var(--yellow);box-shadow:0 0 8px var(--yellow-glow);flex:0 0 20px;margin-top:7px}

/* ---------- anexo (divisor de sección) ---------- */
.slide[data-tipo="anexo"]{align-items:center;text-align:center}
.slide[data-tipo="anexo"]::before{background:radial-gradient(circle,var(--accent-dim),transparent 62%)}
.slide[data-tipo="anexo"] .kicker{margin-left:auto;margin-right:auto}
.slide[data-tipo="anexo"] .titular{max-width:24ch;margin:0 auto;font-size:clamp(26px,3.4vw,40px)}
.slide[data-tipo="anexo"] .subtitulo{margin-left:auto;margin-right:auto}

/* ---------- motor de desarrollo (flywheel + vías) ---------- */
.slide[data-tipo="motor"]{padding-top:clamp(28px,3.8vw,46px);padding-bottom:clamp(20px,2.8vw,36px)}
.slide[data-tipo="motor"]::before{background:radial-gradient(circle,var(--yellow-dim),transparent 62%)}
.slide[data-tipo="motor"] .titular{font-size:clamp(20px,2.5vw,30px);max-width:44ch}
.mtr-flow{margin-top:clamp(12px,1.8vw,20px);display:flex;align-items:stretch;gap:8px}
.mtr-node{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:3px;justify-content:center;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:11px 14px}
.mtr-node.is-on{background:var(--yellow-dim);border-color:rgba(243,249,89,.42);box-shadow:0 0 0 1px rgba(243,249,89,.12)}
.mtr-node-lab{font-size:clamp(13px,1.5vw,16px);font-weight:700;color:var(--text-bright);line-height:1.15}
.mtr-node.is-on .mtr-node-lab{color:var(--yellow)}
.mtr-node-sub{font-size:10.5px;color:var(--muted);line-height:1.25}
.mtr-arrow{display:flex;align-items:center;color:var(--muted);font-size:18px;flex:0 0 auto}
.mtr-loop{margin-top:10px;display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--subtle);line-height:1.4}
.mtr-loop-ic{color:var(--yellow);font-size:16px;flex:0 0 auto}
.mtr-cards{margin-top:clamp(12px,1.8vw,20px);display:grid;grid-template-columns:1fr 1fr;gap:clamp(14px,1.8vw,24px)}
.mtr-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:clamp(13px,1.7vw,20px)}
.mtr-card.is-col{border-color:rgba(243,249,89,.28)}
.mtr-card-h{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.mtr-card-tag{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
.mtr-card.is-col .mtr-card-tag{color:var(--yellow)}
.mtr-card-t{font-size:clamp(15px,1.7vw,19px);font-weight:700;color:var(--text-bright);line-height:1.15}
.mtr-card-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.mtr-card-list li{position:relative;padding-left:16px;font-size:clamp(12px,1.35vw,14px);line-height:1.4;color:var(--subtle)}
.mtr-card-list li::before{content:'';position:absolute;left:0;top:6px;width:5px;height:5px;border-radius:1px;background:var(--accent);transform:rotate(45deg)}
.mtr-card.is-col .mtr-card-list li::before{background:var(--yellow)}
.mtr-card-list b{color:var(--text-bright);font-weight:700}
.mtr-foot{margin-top:clamp(11px,1.5vw,16px);display:flex;align-items:flex-start;gap:10px;font-size:11.5px;color:var(--muted);line-height:1.45;max-width:94ch}
.mtr-foot .bx-bar{width:20px;height:2px;border-radius:2px;background:var(--yellow);box-shadow:0 0 8px var(--yellow-glow);flex:0 0 20px;margin-top:7px}

/* ---------- responsive / móvil (al final: gana sobre los componentes) ---------- */
@media (max-width:820px){
  html,body{overflow-x:hidden}
  .slide{justify-content:flex-start;overflow-y:auto;overflow-x:hidden;padding:58px clamp(15px,5vw,22px) 92px;-webkit-overflow-scrolling:touch}
  .ghost-n{display:none}
  .nav{display:none}
  /* anular topes en ch que en móvil desbordan el ancho (misma especificidad que las reglas por tipo) */
  .titular,.subtitulo,.destacado,.bullets{max-width:none}
  .slide[data-tipo] .titular,.slide[data-tipo] .subtitulo,.slide[data-tipo] .destacado{max-width:none}
  .slide[data-tipo="cover"] .cover-title,.slide[data-tipo="cover"] .subtitulo{max-width:none}
  /* evitar que hijos de grid/flex fuercen overflow horizontal */
  .com-main,.com-side,.com-tier,.mtr-card,.mtr-node,.calc-controls,.calc-bars,.vx-barwrap,.ex-info,.bx-cell{min-width:0}
  .grid,.grid.g2{grid-template-columns:1fr}
  .rec{grid-template-columns:1fr;gap:12px}
  .rec-card:not(:last-child)::after{display:none}
  /* aportaciones (tablas benx) → tarjetas apiladas */
  .benx-head{display:none}
  .benx-row{grid-template-columns:1fr}
  .bx-rail{flex-direction:row;align-items:center;gap:9px;border-right:0;border-bottom:1px solid var(--border)}
  .bx-mono{margin-bottom:0}
  .bx-cell{border-right:0;border-bottom:1px solid var(--border)}
  .bx-cell:last-child{border-bottom:0}
  /* escaleras */
  .escx-row{grid-template-columns:1fr;gap:10px}
  .ex-track{flex-wrap:wrap}
  .ex-chip{flex:1 1 140px;max-width:none}
  .ex-arrow{display:none}
  /* comisiones */
  .com-wrap{grid-template-columns:1fr}
  .com-tier{grid-template-columns:1fr;gap:5px}
  /* vesting */
  .vstx-row{grid-template-columns:1fr;gap:8px}
  /* calculadora */
  .calc{grid-template-columns:1fr;gap:18px}
  /* motor de desarrollo */
  .mtr-flow{flex-direction:column}
  .mtr-arrow{transform:rotate(90deg);align-self:center}
  .mtr-cards{grid-template-columns:1fr}
  /* timeline inflexión */
  .infx{grid-template-columns:1fr}
}

/* ---------- impresión / PDF ---------- */
@media print{
  @page{size:1280px 720px;margin:0}
  html,body{overflow:visible;background:var(--bg)}
  #progress,.footer .counter,.dots,.nav,.hint,.notas-flag{display:none!important}
  #stage{height:auto}
  .slide{position:relative;inset:auto;opacity:1!important;visibility:visible!important;
    transform:none!important;height:720px;width:1280px;page-break-after:always;break-after:page}
  .slide::before{print-color-adjust:exact;-webkit-print-color-adjust:exact}
  body.show-notas .slide-nota{display:block}
}

/* ---------- matriz de escenarios ---------- */
.mtx-wrap{margin-top:16px;overflow-x:auto}
.mtx{border-collapse:separate;border-spacing:5px;width:100%;font-variant-numeric:tabular-nums}
.mtx th,.mtx td{padding:8px 6px;text-align:center;font-size:14px;border-radius:9px;white-space:nowrap}
.mtx thead th{color:var(--muted);font-weight:700;font-size:12px;background:transparent}
.mtx .mtx-corner{text-align:left;min-width:128px;line-height:1.3}
.mtx .mtx-corner .mtx-cl{display:block;color:var(--accent);font-size:11px;font-weight:700}
.mtx .mtx-corner .mtx-rl{display:block;color:var(--muted);font-size:11px;font-weight:600}
.mtx .mtx-rh{background:rgba(255,255,255,.05);color:var(--text);font-weight:800;font-size:15px}
.mtx td{color:var(--muted);background:rgba(255,255,255,.035);font-weight:600}
.mtx td.lvl0{color:#7a7a7a;background:rgba(255,255,255,.035)}
.mtx td.lvl1{color:#f4dba0;background:rgba(245,158,11,.16);box-shadow:inset 0 0 0 1px rgba(245,158,11,.34)}
.mtx td.lvl2{color:#c4efce;background:rgba(34,197,94,.20);box-shadow:inset 0 0 0 1px rgba(34,197,94,.42);font-weight:800}
.mtx-leg{display:flex;gap:20px;flex-wrap:wrap;margin-top:15px;font-size:12.5px;color:var(--subtle)}
.mtx-leg-it{display:inline-flex;align-items:center;gap:8px}
.mtx-leg-it i{width:13px;height:13px;border-radius:4px;display:inline-block}
.mtx-leg-it.lvl0 i{background:rgba(255,255,255,.12)}
.mtx-leg-it.lvl1 i{background:rgba(245,158,11,.55)}
.mtx-leg-it.lvl2 i{background:rgba(34,197,94,.6)}
.mtx-foot{display:flex;gap:9px;align-items:flex-start;margin-top:15px;color:var(--muted);font-size:13px;max-width:980px;line-height:1.5}
.mtx-foot .bx-bar{flex:none;width:20px;height:2px;border-radius:2px;background:var(--yellow);margin-top:9px}
</style>

l 10% sobre la facturación TOTAL de la plataforma del mes vencido, hasta vaciarla. Ese 10% es un tope COMÚN con el cobro diferido de Pablo y la cuota de gestión de Alejandro: si varios tienen saldo, se reparte entre ellos a prorrata de lo pendiente de cada uno. Compras trimestrales o anuales: el pago se prorratea."},"otros":[{"rol":"Alejandro · thenucleo","sub":"Mercado abierto · ADS","texto":"Dos cobros. (1) 5% recurrente sobre cada suscripción que trae su canal, NETO de CAC: la plataforma recupera primero el gasto en ADS y desde ahí cobra el 5% — y lo cobra DESDE EL PRINCIPIO, sin esperar (a diferencia de Miguel). (2) Cuota por gestionar las campañas: sí la cobra, pero solo desde caja sostenible y dentro del 10% común, a prorrata con Miguel y Pablo."},{"rol":"Add-ons","sub":"Fuera del referido","texto":"El uso de add-ons no comisiona a referidos. Su reparto (Portal / desarrollador) corre por el motor de desarrollo."}],"nota":"Comisiones (Ben, definidas). Miguel: escalada 50/25/10% sobre el recurrente de sus cuentas → bolsa que se libera en caja sostenible, a máx. 10% sobre la facturación TOTAL del mes vencido, hasta vaciarla; trimestral/anual prorrateado. Ese 10% es COMÚN y se reparte A PRORRATA entre la bolsa de Miguel, el cobro diferido de Pablo y la cuota de gestión de Alejandro. Alejandro además cobra un 5% recurrente NETO de CAC DESDE EL PRINCIPIO (a diferencia de Miguel). Add-ons: 100% Portal+Hacelerix, sin comisión. Importe de la cuota de gestión: [a cerrar].","placeholder":false,"n":7},{"tipo":"equipo","kicker":"Quiénes somos","titular":"Cuatro socios. Cuatro activos que no se compran con dinero.","subtitulo":"Cada uno entra con algo que el proyecto no puede contratar fuera.","destacado":"Lo que aporta cada uno vale por lo que es, no por su porcentaje.","bullets":["Benja (CEO/CFO) — el MVP construido y 5k. Dirige, capta capital y administra. La prueba de que el equipo ejecuta.","Alejandro / thenucleo (CMO) — gestiona el marketing y las ADS de la empresa para todo el mercado, no para un socio. Financió el desarrollo previo.","Miguel / Zenyx (Ventas y Product Owner) — vende a los early adopters por su lanzadera; ya tiene 15+ comprometidos. El canal de entrada al mercado.","Pablo / Hacelerix (CTO) — equipo de desarrollo y 5k. Convierte el MVP en producto vendible y mantiene a raya el riesgo técnico."],"nota":"Responde a Pablo ('algo que a mí no me sirve') y a Miguel reconociendo el activo único de cada uno antes de hablar de equity: el canal de venta de Miguel (early adopters vía su lanzadera) como pieza estratégica, no aporte menor.","placeholder":false,"n":8},{"tipo":"aportaciones","kicker":"Aportaciones","titular":"Qué pone cada uno sobre la mesa.","subtitulo":"Cada uno entra con trabajo y activos en especie, más una aportación económica.","destacado":"","socios":[{"rol":"CEO/CFO","persona":"Benja","aporta":["El MVP ya construido","Dirección, fundraising y administración"],"capital":"5.000€ · desembolso único"},{"rol":"CMO","persona":"Alejandro · thenucleo","aporta":["Gestión del marketing y las campañas de ADS (las paga la empresa)","Financió el desarrollo previo","Equipo de operaciones"],"capital":"3.000€ one-shot · ó 500€/mes ×7"},{"rol":"Ventas y Product Owner","persona":"Miguel · Zenyx","aporta":["Venta a early adopters por su lanzadera","Evangelización y know-how de agencia"],"capital":"3.000€ one-shot · ó 500€/mes ×7"},{"rol":"CTO","persona":"Pablo · Hacelerix","aporta":["Equipo de desarrollo (al llegar su tramo)","Backend del core de la plataforma","Cobro diferido del coste de su equipo (tope común con Miguel)"],"capital":"5.000€ · desembolso único"}],"nota":"Aportaciones (Ben). Capital: Benja y Pablo 5.000€ one-shot. Alejandro y Miguel: 3.000€ one-shot ó 500€/mes ×7 (= 3.500€); el one-shot es más barato → premia el cash adelantado; la prima de 500€ del mensual compensa el desembolso diferido y el riesgo de impago. En especie: cada uno su activo/trabajo. Pablo: equipo de dev al llegar su tramo + backend del core; el coste de su equipo se devenga desde que entra pero con COBRO DIFERIDO hasta que la caja puede pagarlo, liberándose dentro de un tope del 10% COMÚN con la bolsa de Miguel (un único 10% para los dos; si ambos tienen saldo, a prorrata; no es un préstamo). Sustituye al antiguo 50% de subvención.","placeholder":false,"n":9},{"tipo":"riesgo","kicker":"Riesgo y recompensa","titular":"Quien arriesga más al principio, libera antes","subtitulo":"El equity refleja el aporte total; el vesting refleja quién pone el riesgo primero.","destacado":"El reparto no es 'a partes iguales': es proporcional a lo que cada uno arriesga y cuándo.","bullets":["Equity final — 37 / 21 / 21 / 21. Refleja el aporte total a 5 años, no el cheque de hoy.","Vesting por hitos — quien pone el riesgo inicial (los 5k de Pablo y el coste de desarrollo que cobra diferido, el MVP de Benja) libera antes. El resto, contra hitos de producto y venta.","Capital real, no solo horas — Pablo y Benja ponen 5k cada uno. Ese cheque se reconoce en la liberación, no se diluye.","Nadie cobra equity por estar — se libera contra hitos verificables. Quien ejecuta, acumula."],"nota":"Responde a Pablo: 'asumo el riesgo inicial más alto y el resto solo 500/mes'. Mensaje implícito: tu riesgo extra se compensa liberando antes, no con un % que descuadre el reparto. PLACEHOLDER: el calendario de vesting exacto lo cierra Ben.","placeholder":true,"n":10},{"tipo":"vesting","kicker":"Distribución del vesting","titular":"Cómo se reparte y se libera el equity","subtitulo":"El equity final refleja el aporte total; el inmediato, lo ya aportado. El resto se libera contra hitos.","destacado":"","socios":[{"rol":"CEO/CFO","persona":"Benja","inmediato":13,"final":37,"hitos":"Permanencia como CEO · lineal a 4 años con cliff de 12 meses"},{"rol":"CMO","persona":"Alejandro · thenucleo","inmediato":12,"final":21,"hitos":"ADS 12m + canal que convierte 6m + 15 clientes por campañas · 3+3+3"},{"rol":"CTO","persona":"Pablo · Hacelerix","inmediato":7,"final":21,"hitos":"MVP vendible y 5 clientes + integración del top-10 + 25 agencias estables · 5+5+4"},{"rol":"Ventas y Product Owner","persona":"Miguel · Zenyx","inmediato":4,"final":21,"hitos":"5 early adopters + 15 clientes activos 3m + retención 70% y PO · 5+6+6"}],"pie":"Bloqueo 12 meses · good/bad leaver · drag & tag al 75% · IP íntegra de la sociedad · decisiones duras requieren 75%.","nota":"Vesting — hitos re-mapeados al 37/21/21/21 (Ben, 2026-06-14). Inmediato 36% al constituir (13/12/7/4). Por hitos 64%: cada hito libera su % al cumplirse de forma verificable, irrevocable; si vence sin cumplirse vuelve a la sociedad a valor nominal (pacto cl.3.4). Benja: por permanencia/tiempo, lineal 4 años con cliff 12m (mes 12 libera 6%, luego ~0,5%/mes hasta +24%). Alex +9 (3+3+3): ADS 12m · canal convierte 6m · 15 clientes por campañas. Pablo +14 (5+5+4): MVP vendible+5 clientes · integración del top-10 · 25 agencias estables 2m. Miguel +17 (5+6+6): 5 early adopters de pago · 15 clientes de su red activos 3m · retención ≥70% a 6m + rol PO. Bloqueo 12m; bad/good leaver (cl.4).","placeholder":false,"n":11},{"tipo":"calculadora","kicker":"De dónde sale el reparto","titular":"La ecuación del equity, en abierto","subtitulo":"Cada socio puntúa 1–5 en seis dimensiones. Mueve el peso de cada una y el reparto se recalcula en vivo: el modelo no es arbitrario.","destacado":"","socios":[{"rol":"CEO/CFO","persona":"Benja"},{"rol":"CTO","persona":"Pablo · Hacelerix"},{"rol":"CMO","persona":"Alejandro · thenucleo"},{"rol":"Ventas y Product Owner","persona":"Miguel · Zenyx"}],"dimensiones":[{"k":"Capital a riesgo","w":50,"scores":[4,4,2,2]},{"k":"Dedicación","w":50,"scores":[5,2,3,3]},{"k":"Riesgo total","w":50,"scores":[4,4,2,2]},{"k":"Valor del rol","w":50,"scores":[5,3,4,4]},{"k":"Experiencia","w":50,"scores":[5,4,4,4]},{"k":"Permanencia","w":50,"scores":[5,3,3,3]}],"objetivo":[37,21,21,21],"pie":"Un líder y tres co-fundadores iguales: 37 / 21 / 21 / 21. Lo singular de cada uno no infla su porcentaje, se reconoce en la liberación. El capital de Pablo se refleja en su liberación inmediata (7%); y el 4% de Miguel premia su conocimiento del sector y le abre una consolidación más rápida a medida que trae a los early adopters y da forma a la herramienta desde dentro como Product Owner.","nota":"Calculadora de transparencia (Ben). Pesos por defecto = equilibrados → ~34/24/21/21; las marcas verticales son el objetivo 37/21/21/21. Alex y Miguel tienen puntuaciones idénticas → siempre empatan. El modelo da a Benja ~34 (no 37): el 37 es prima de liderazgo explícita y el exceso de Pablo (~24) se traslada al inmediato. Mueve los pesos en vivo para enseñar que el reparto es estable.","placeholder":false},{"tipo":"validacion","kicker":"Cómo lo probamos","titular":"La hipótesis está sin validar. Así de barato lo comprobamos.","subtitulo":"El riesgo técnico está reducido; lo difícil, vender y validar, es lo que está por delante.","destacado":"Una agencia no evangelizada no paga; por eso empezamos por las que ya nos escuchan.","bullets":["Hipótesis a validar — una agencia paga por recuperar tiempo y por lo a medida, no por funciones cerradas.","Sin quemar dinero — los 15+ early adopters de Miguel como primera cohorte de pago, no un lanzamiento a ciegas.","Señal de demanda — la campaña de Alejandro al mercado abierto: ¿convierte como el canal de Miguel?","Criterio honesto — si no pagan, lo sabremos barato y pronto. El MVP deja iterar sin reconstruir."],"nota":"Responde a Miguel y a la cita de COR ('nada validado, una agencia no evangelizada no paga') con un plan Lean honesto: le damos la razón y la convertimos en método. Refuerza que el riesgo cubierto por el MVP es el técnico, no la venta. Métricas y umbral de conversión = [A definir por Ben].","placeholder":true,"n":17},{"tipo":"matriz","kicker":"Cuándo nos sostenemos","titular":"Pocas agencias bastan: break-even con ~13, caja sostenible con ~19.","subtitulo":"El MRR (ingreso recurrente al mes) = nº de agencias × ARPA (lo que paga cada una al mes). Con un ARPA de ~166€ —los 79€ de suscripción más sus add-ons— esta es la tabla del MRR según cuántas agencias tengamos:","destacado":"La clave es el ARPA: cada agencia paga ~166€, no solo los 79€ de la base. Por eso el MRR sube rápido y bastan pocas agencias.","colLabel":"ARPA · lo que paga cada agencia al mes →","rowLabel":"Nº de agencias ↓","cols":["79€","120€","166€ ✦","200€","240€","280€"],"filas":[{"ag":"10","celdas":[{"t":"790","lvl":0},{"t":"1.200","lvl":0},{"t":"1.660","lvl":0},{"t":"2.000","lvl":0},{"t":"2.400","lvl":1},{"t":"2.800","lvl":1}]},{"ag":"13","celdas":[{"t":"1.027","lvl":0},{"t":"1.560","lvl":0},{"t":"2.158","lvl":1},{"t":"2.600","lvl":1},{"t":"3.120","lvl":2},{"t":"3.640","lvl":2}]},{"ag":"16","celdas":[{"t":"1.264","lvl":0},{"t":"1.920","lvl":0},{"t":"2.656","lvl":1},{"t":"3.200","lvl":2},{"t":"3.840","lvl":2},{"t":"4.480","lvl":2}]},{"ag":"19","celdas":[{"t":"1.501","lvl":0},{"t":"2.280","lvl":1},{"t":"3.154","lvl":2},{"t":"3.800","lvl":2},{"t":"4.560","lvl":2},{"t":"5.320","lvl":2}]},{"ag":"22","celdas":[{"t":"1.738","lvl":0},{"t":"2.640","lvl":1},{"t":"3.652","lvl":2},{"t":"4.400","lvl":2},{"t":"5.280","lvl":2},{"t":"6.160","lvl":2}]},{"ag":"26","celdas":[{"t":"2.054","lvl":1},{"t":"3.120","lvl":2},{"t":"4.316","lvl":2},{"t":"5.200","lvl":2},{"t":"6.240","lvl":2},{"t":"7.280","lvl":2}]}],"leyenda":[{"lvl":0,"txt":"Por debajo del break-even (MRR < 2.030€): aún no cubre los costes"},{"lvl":1,"txt":"Break-even (MRR 2.030–3.000€): cubre los costes del mes"},{"lvl":2,"txt":"Caja sostenible (MRR ≥ 3.000€): cubre los costes con margen"}],"pie":"✦ El caso esperado es ARPA ~166€ (suscripción 79€ + add-ons). Las demás columnas son por si el ARPA acaba siendo mayor o menor. Cada celda = el MRR de ese mes.","nota":"Matriz de escenarios de caja sostenible (Ben, 2026-06-15, v3). Add-ons sin precio fijo → modelada por INGRESO MEDIO POR AGENCIA (ARPA). ARPA esperado ~166€ (suscripción 79 + add-ons, TODO incluido; confirmado por Ben). MRR = nº agencias × ARPA. Niveles: <2.030 pierde; 2.030–3.000 cubre costes (sostenible si los desarrollos one-off ~6-8 a 800-1.000€ pagan el colchón de 6k); ≥3.000 genera el colchón con el propio MRR. A ARPA 166: ~13 agencias break-even, ~19 con colchón. Excluidos del umbral: ADS, aportaciones iniciales, recurrentes de socios. Ver §8.1c del doc.","placeholder":false},{"tipo":"exit","kicker":"El largo plazo","titular":"El exit es real, pero improbable. Y lo decimos claro.","subtitulo":"No es la razón para entrar hoy; es el techo si todo sale bien.","destacado":"El exit es un objetivo, no una promesa: el retorno que de verdad importa llega antes, en recurrente.","bullets":["Horizonte — 4 a 6 años hasta una posible absorción, no un golpe rápido","Si se da — se busca un exit global de 7 cifras o más, repartido según el equity (37/21/21/21).","Probabilidad — baja y explícita; no es la razón para entrar hoy","El retorno de verdad — el cash recurrente antes del exit (bolsa, comisión, margen), no la lotería de la venta"],"nota":"Exit (Ben, 2026-06-14): cambia la regla previa de \"sin cifras de exit\". Ahora se declara un OBJETIVO de exit de 7 cifras o más (millones), como aspiración, NO promesa. Probabilidad baja, horizonte 4-6 años, reparto según equity; el retorno real es el recurrente antes del exit.","placeholder":false,"n":18},{"tipo":"anexo","kicker":"Anexo · material de apoyo","titular":"Recorrido por socio","subtitulo":"El detalle de qué gana cada uno y cuándo —Empieza · Evoluciona · Termina—. Para abrir solo si surge la pregunta; fuera del recorrido de 40 minutos.","destacado":"","placeholder":false},{"tipo":"recorrido","kicker":"Recorrido · Benja","titular":"El recorrido de Benja","subtitulo":"CEO/CFO — el que más arriesga en tiempo y permanencia.","destacado":"","fases":[{"fase":"Empieza","que":"37% final · 13% liberado ya · 5k","porque":"Llega con el MVP hecho y se ata full-time a 5 años. El 13% inmediato reconoce el producto que ya existe."},{"fase":"Evoluciona","que":"Libera 24% por hitos, a 5 años","porque":"El que más tarda en liberar. Se gana su parte sosteniendo dirección, fundraising y admin, con sueldo mínimo hasta su inflexión."},{"fase":"Termina","que":"37% + sueldo normalizado + exit","highlight":true,"porque":"Más dedicación y permanencia → la mayor parte. Su palanca es el equity, no el cash."}],"placeholder":false,"n":13},{"tipo":"recorrido","kicker":"Recorrido · Alejandro","titular":"El recorrido de Alejandro","subtitulo":"CMO · thenucleo — el motor de captación.","destacado":"","fases":[{"fase":"Empieza","que":"21% final · 12% liberado ya","porque":"Su agencia financió el desarrollo previo. Ese aporte pasado le da el segundo inmediato más alto."},{"fase":"Evoluciona","que":"Libera 9% por hitos · gestiona la captación","porque":"Hitos de marketing, estrategia y paid media. Gestiona las ADS de la empresa (las paga ella), para todo el mercado."},{"fase":"Termina","que":"21% + 5% recurrente + cuota de gestión + exit","highlight":true,"porque":"Aporta el motor de captación de todo el mercado. Cash-motivado: menos equity, más cash — 5% recurrente desde el inicio + cuota de gestión desde caja sostenible (en el 10% común)."}],"placeholder":false,"n":14},{"tipo":"recorrido","kicker":"Recorrido · Pablo","titular":"El recorrido de Pablo","subtitulo":"CTO · Hacelerix — capital y desarrollo.","destacado":"","fases":[{"fase":"Empieza","que":"21% final · 7% liberado ya · 5k","porque":"Pone 5k: su inmediato lo reconoce. Junior y con poca dedicación inicial, no llega a pilar."},{"fase":"Evoluciona","que":"Libera 14% por hitos · escalera técnica","porque":"Liberado de lo técnico hasta 10 clientes → su equipo entra al 50% → 100% cuando la caja es sostenible → margen 30€/h."},{"fase":"Termina","que":"21% + dev con margen + exit","highlight":true,"porque":"Capital y riesgo técnico, compensados cobrando las horas con margen. Su valor de rol hoy es junior."}],"placeholder":false,"n":15},{"tipo":"recorrido","kicker":"Recorrido · Miguel","titular":"El recorrido de Miguel","subtitulo":"Ventas y Product Owner · Zenyx — el canal de entrada al mercado.","destacado":"","fases":[{"fase":"Empieza","que":"21% final · 4% liberado ya","porque":"Empieza de cero, sin aporte pasado: el menor inmediato. Pero traer el canal lo lleva igual al 21%."},{"fase":"Evoluciona","que":"Libera 17% por hitos · llena su bolsa","porque":"El que más gana por hitos (early adopters, recurrencia, activación). Cada venta llena su bolsa de comisión 50/25/10."},{"fase":"Termina","que":"21% + su bolsa de comisión + exit","highlight":true,"porque":"Hace lo más difícil —vender— premiado sobre todo en CASH, no en equity, porque es cash-motivado."}],"placeholder":false,"n":16}]}</script>
<script>
(function(){
  "use strict";
  var deck = JSON.parse(document.getElementById('deck-data').textContent);
  var slides = deck.slides || [];
  var stage = document.getElementById('stage');
  var dotsWrap = document.querySelector('.dots');

  function esc(s){return String(s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  function decorate(text){
    return esc(text)
      .replace(/\(en vivo\)/gi,'<span class="st st-vivo">EN VIVO</span>')
      .replace(/\(en curso\)/gi,'<span class="st st-curso">EN CURSO</span>')
      .replace(/(\[[^\]]*(?:A completar|A definir|a confirmar|pendiente|rango|umbral)[^\]]*\])/gi,'<span class="ph-inline">$1<\/span>');
  }
  function n2(i){return (i<10?'0':'')+i;}

  function bulletsList(arr){
    var ul = document.createElement('ul'); ul.className='bullets';
    arr.forEach(function(b){
      var li=document.createElement('li');
      if(/\[A completar/i.test(b)) li.className='is-ph';
      li.innerHTML='<span class="mk"></span><span>'+decorate(b)+'</span>';
      ul.appendChild(li);
    });
    return ul;
  }
  function bulletsGrid(arr){
    var g=document.createElement('div'); g.className='grid';
    arr.forEach(function(b){
      var card=document.createElement('div'); card.className='card';
      var sep = b.indexOf('—')>-1 ? '—' : (b.indexOf(':')>-1 ? ':' : null);
      var h='', p=b;
      if(sep){var idx=b.indexOf(sep); h=b.slice(0,idx).trim(); p=b.slice(idx+1).trim();}
      if(/\[A completar/i.test(b)) card.className='card is-ph';
      card.innerHTML=(h?'<h3>'+decorate(h)+'</h3>':'')+'<p>'+decorate(p)+'</p>';
      g.appendChild(card);
    });
    return g;
  }

  slides.forEach(function(s,i){
    var art=document.createElement('article');
    art.className='slide'; art.setAttribute('data-tipo',s.tipo); art.id='s'+(i+1);
    var w=document.createElement('div'); w.className='wrap';

    var gn=document.createElement('div'); gn.className='ghost-n'; gn.textContent=n2(i+1);
    art.appendChild(gn);

    if(s.placeholder){
      var bp=document.createElement('div'); bp.className='badge-ph';
      bp.innerHTML='✎ Slide por completar';
      w.appendChild(bp);
    }

    if(s.tipo==='cover'){
      var k=document.createElement('div'); k.className='kicker';
      k.innerHTML='<span class="dot"></span>'+esc(s.kicker||'');
      var wm=document.createElement('div'); wm.className='wordmark sm';
      wm.innerHTML='the <span class="pt">nucleo</span>';
      w.appendChild(k); w.appendChild(wm);
      if(s.titular){var ct=document.createElement('h1'); ct.className='titular cover-title'; ct.textContent=s.titular; w.appendChild(ct);}
      if(s.subtitulo){var sub=document.createElement('p'); sub.className='subtitulo'; sub.textContent=s.subtitulo; w.appendChild(sub);}
      if(s.destacado){var lp=document.createElement('div'); lp.className='live-pill';
        lp.innerHTML='<span class="dot"></span>'+esc(s.destacado); w.appendChild(lp);}
      if(s.bullets&&s.bullets.length) w.appendChild(bulletsList(s.bullets));
    } else {
      if(s.kicker){var k2=document.createElement('div'); k2.className='kicker';
        k2.innerHTML='<span class="dot"></span>'+esc(s.kicker); w.appendChild(k2);}
      var h1=document.createElement('h1'); h1.className='titular'; h1.textContent=s.titular; w.appendChild(h1);
      if(s.subtitulo){var s2=document.createElement('p'); s2.className='subtitulo'; s2.textContent=s.subtitulo; w.appendChild(s2);}
      if(s.destacado && s.destacado.trim()){
        var d=document.createElement('div'); d.className='destacado'; d.innerHTML=decorate(s.destacado); w.appendChild(d);
      }
      if(s.tipo==='beneficios' && s.socios && s.socios.length){
        var bx=document.createElement('div'); bx.className='benx';
        var hr=document.createElement('div'); hr.className='benx-row benx-head';
        hr.innerHTML='<div class="bx-rail"></div><div class="bx-cell bx-h">Corto plazo · 0–12 meses</div><div class="bx-cell bx-h">Medio plazo · 1–3 años</div>';
        bx.appendChild(hr);
        s.socios.forEach(function(p){
          var row=document.createElement('div'); row.className='benx-row';
          var mono=(p.persona||p.rol||'·').trim().charAt(0).toUpperCase();
          var rail='<div class="bx-rail"><span class="bx-mono">'+esc(mono)+'</span><span class="bx-rol">'+esc(p.rol||'')+'</span><span class="bx-persona">'+esc(p.persona||'')+'</span></div>';
          var cp='<div class="bx-cell">'+(p.cp||[]).map(function(x){return '<span class="bx-li">'+decorate(x)+'</span>';}).join('')+'</div>';
          var md='<div class="bx-cell bx-md">'+(p.medio||[]).map(function(x){return '<span class="bx-li">'+decorate(x)+'</span>';}).join('')+'</div>';
          row.innerHTML=rail+cp+md; bx.appendChild(row);
        });
        var ft=document.createElement('div'); ft.className='benx-foot';
        ft.innerHTML='<span class="bx-bar"></span><span>Largo plazo, para los cuatro: <b>el exit</b> — el techo si todo sale bien, no la razón para entrar hoy.</span>';
        bx.appendChild(ft);
        w.appendChild(bx);
      }
      if(s.tipo==='escaleras' && s.carriles && s.carriles.length){
        var ex=document.createElement('div'); ex.className='escx';
        s.carriles.forEach(function(c){
          var row=document.createElement('div'); row.className='escx-row'+(c.destacado?' is-key':'');
          var mono=(c.persona||c.rol||'·').trim().charAt(0).toUpperCase();
          var rail='<div class="ex-rail"><span class="ex-mono">'+esc(mono)+'</span><span class="ex-info"><span class="ex-rol">'+esc(c.rol||'')+'</span><span class="ex-persona">'+esc(c.persona||'')+'</span></span></div>';
          var track='<div class="ex-track">'+(c.pasos||[]).map(function(p,pi){
            return (pi>0?'<span class="ex-arrow">›</span>':'')+'<span class="ex-chip'+(p.activa?' is-on':'')+'"><span class="ex-lab">'+decorate(p.label||'')+'</span>'+(p.sub?'<span class="ex-sub">'+decorate(p.sub)+'</span>':'')+'</span>';
          }).join('')+'</div>';
          row.innerHTML=rail+track; ex.appendChild(row);
        });
        w.appendChild(ex);
        if(s.pie){var pe=document.createElement('div'); pe.className='escx-foot'; pe.innerHTML=decorate(s.pie); w.appendChild(pe);}
      }
      if(s.tipo==='comisiones' && s.referido){
        var cw=document.createElement('div'); cw.className='com-wrap';
        var main=document.createElement('div'); main.className='com-main';
        var mh='<div class="com-h">'+esc(s.referido.persona||'')+'</div>';
        (s.referido.tramos||[]).forEach(function(t,ti){
          var pn=parseInt(t.pct,10)||0; var bw=Math.max(16,Math.round(pn/50*100));
          mh+='<div class="com-tier'+(ti===0?' is-top':'')+'"><div class="rango">'+esc(t.rango)+'</div>'+
              '<div class="com-bartrack"><div class="com-bar" style="width:'+bw+'%">'+esc(t.pct)+'</div></div></div>';
        });
        if(s.referido.nota) mh+='<div class="com-note">'+decorate(s.referido.nota)+'</div>';
        main.innerHTML=mh; cw.appendChild(main);
        var side=document.createElement('div'); side.className='com-side';
        (s.otros||[]).forEach(function(o){
          side.innerHTML+='<div class="com-card"><div class="com-card-h">'+esc(o.rol||'')+'<span>'+esc(o.sub||'')+'</span></div><div class="com-card-t">'+decorate(o.texto||'')+'</div></div>';
        });
        cw.appendChild(side);
        w.appendChild(cw);
      }
      if(s.tipo==='aportaciones' && s.socios && s.socios.length){
        var ax=document.createElement('div'); ax.className='benx';
        var ah=document.createElement('div'); ah.className='benx-row benx-head';
        ah.innerHTML='<div class="bx-rail"></div><div class="bx-cell bx-h">Aporta al proyecto</div><div class="bx-cell bx-h">Capital / cuota</div>';
        ax.appendChild(ah);
        s.socios.forEach(function(p){
          var row=document.createElement('div'); row.className='benx-row';
          var mono=(p.persona||p.rol||'·').trim().charAt(0).toUpperCase();
          var rail='<div class="bx-rail"><span class="bx-mono">'+esc(mono)+'</span><span class="bx-rol">'+esc(p.rol||'')+'</span><span class="bx-persona">'+esc(p.persona||'')+'</span></div>';
          var ap='<div class="bx-cell">'+(p.aporta||[]).map(function(x){return '<span class="bx-li">'+decorate(x)+'</span>';}).join('')+'</div>';
          var cap='<div class="bx-cell bx-md"><span class="bx-cap">'+decorate(p.capital||'')+'</span></div>';
          row.innerHTML=rail+ap+cap; ax.appendChild(row);
        });
        w.appendChild(ax);
      }
      if(s.tipo==='vesting' && s.socios && s.socios.length){
        var maxF=Math.max.apply(null,s.socios.map(function(p){return p.final||0;}))||1;
        var lg=document.createElement('div'); lg.className='vx-key';
        lg.innerHTML='<span><i class="vx-sw vx-sw-now"></i>Liberado ya</span><span><i class="vx-sw vx-sw-hito"></i>Por hitos</span>';
        w.appendChild(lg);
        var vx=document.createElement('div'); vx.className='vstx';
        s.socios.forEach(function(p){
          var row=document.createElement('div'); row.className='vstx-row';
          var mono=(p.persona||p.rol||'·').trim().charAt(0).toUpperCase();
          var barW=Math.round((p.final||0)/maxF*100);
          var immW=p.final?Math.round((p.inmediato||0)/p.final*100):0;
          var rail='<div class="vx-rail"><span class="bx-mono">'+esc(mono)+'</span><span class="ex-info"><span class="bx-rol">'+esc(p.rol||'')+'</span><span class="bx-persona">'+esc(p.persona||'')+'</span></span></div>';
          var bar='<div class="vx-barwrap"><div class="vx-bar" style="width:'+barW+'%"><div class="vx-imm" style="width:'+immW+'%"></div><span class="vx-final">'+(p.final||0)+'%</span></div>'+
                  '<div class="vx-legend"><b>'+(p.inmediato||0)+'%</b> ya · <b>'+((p.final||0)-(p.inmediato||0))+'%</b> por hitos — '+esc(p.hitos||'')+'</div></div>';
          row.innerHTML=rail+bar; vx.appendChild(row);
        });
        w.appendChild(vx);
        if(s.pie){var pe=document.createElement('div'); pe.className='vx-foot'; pe.innerHTML='<span class="bx-bar"></span><span>'+decorate(s.pie)+'</span>'; w.appendChild(pe);}
      }
      if(s.tipo==='recorrido' && s.fases && s.fases.length){
        var rc=document.createElement('div'); rc.className='rec';
        s.fases.forEach(function(fp){
          var card=document.createElement('div'); card.className='rec-card'+(fp.highlight?' is-end':'');
          card.innerHTML='<div class="rec-fase">'+esc(fp.fase||'')+'</div><div class="rec-que">'+decorate(fp.que||'')+'</div><div class="rec-por">'+decorate(fp.porque||'')+'</div>';
          rc.appendChild(card);
        });
        w.appendChild(rc);
      }
      if(s.tipo==='calculadora' && s.dimensiones && s.socios){
        var SCALE=40;
        var cw2=document.createElement('div'); cw2.className='calc';
        var ctrls=document.createElement('div'); ctrls.className='calc-controls';
        var sliderEls=[], wlabEls=[];
        s.dimensiones.forEach(function(d){
          var rowc=document.createElement('div'); rowc.className='calc-ctrl';
          rowc.innerHTML='<div class="calc-ctrl-top"><span class="calc-dim">'+esc(d.k||'')+'</span><span class="calc-w">—</span></div>';
          var inp=document.createElement('input'); inp.type='range'; inp.min='0'; inp.max='100'; inp.step='1';
          inp.value=(d.w!=null?d.w:50); inp.className='calc-slider';
          rowc.appendChild(inp);
          ctrls.appendChild(rowc);
          sliderEls.push(inp); wlabEls.push(rowc.querySelector('.calc-w'));
        });
        var barsW=document.createElement('div'); barsW.className='calc-bars';
        var fillEls=[], pctEls=[];
        s.socios.forEach(function(p,si){
          var rowb=document.createElement('div'); rowb.className='calc-barrow';
          var mono=(p.persona||p.rol||'·').trim().charAt(0).toUpperCase();
          var obj=(s.objetivo&&s.objetivo[si]!=null)?s.objetivo[si]:null;
          var objLeft=obj!=null?Math.min(100,obj/SCALE*100):null;
          rowb.innerHTML='<div class="calc-rail"><span class="bx-mono">'+esc(mono)+'</span><span class="ex-info"><span class="bx-rol">'+esc(p.rol||'')+'</span><span class="bx-persona">'+esc(p.persona||'')+'</span></span></div>'+
            '<div class="calc-track"><div class="calc-fill"></div>'+
            (objLeft!=null?'<span class="calc-obj" style="left:'+objLeft+'%"></span>':'')+
            '<span class="calc-pct">0%</span></div>';
          barsW.appendChild(rowb);
          fillEls.push(rowb.querySelector('.calc-fill')); pctEls.push(rowb.querySelector('.calc-pct'));
        });
        cw2.appendChild(ctrls); cw2.appendChild(barsW);
        w.appendChild(cw2);
        if(s.objetivo){var lg2=document.createElement('div'); lg2.className='calc-legend';
          lg2.innerHTML='<i></i><span>La marca vertical = objetivo acordado ('+s.objetivo.join('/')+')</span>'; barsW.appendChild(lg2);}
        if(s.pie){var pc2=document.createElement('div'); pc2.className='calc-foot';
          pc2.innerHTML='<span class="bx-bar"></span><span>'+decorate(s.pie)+'</span>'; w.appendChild(pc2);}
        (function(){
          var dims=s.dimensiones, socn=s.socios;
          function recompute(){
            var ws=sliderEls.map(function(el){return parseFloat(el.value)||0;});
            var sw=ws.reduce(function(a,b){return a+b;},0)||1;
            var totals=socn.map(function(_,si){return dims.reduce(function(a,d,di){return a+(d.scores[si]||0)*ws[di];},0);});
            var sum=totals.reduce(function(a,b){return a+b;},0)||1;
            totals.forEach(function(t,si){
              var pct=t/sum*100;
              fillEls[si].style.width=Math.min(100,pct/SCALE*100)+'%';
              pctEls[si].textContent=pct.toFixed(1)+'%';
            });
            ws.forEach(function(wv,di){ wlabEls[di].textContent=Math.round(wv/sw*100)+'%'; });
          }
          sliderEls.forEach(function(el){el.addEventListener('input',recompute);});
          recompute();
        })();
      }
      if(s.tipo==='motor'){
        if(s.flujo && s.flujo.length){
          var mfl=document.createElement('div'); mfl.className='mtr-flow';
          s.flujo.forEach(function(st,fi){
            if(fi>0){var ar=document.createElement('span'); ar.className='mtr-arrow'; ar.textContent='›'; mfl.appendChild(ar);}
            var nd=document.createElement('div'); nd.className='mtr-node'+(st.on?' is-on':'');
            nd.innerHTML='<span class="mtr-node-lab">'+decorate(st.label||'')+'</span>'+(st.sub?'<span class="mtr-node-sub">'+decorate(st.sub)+'</span>':'');
            mfl.appendChild(nd);
          });
          w.appendChild(mfl);
        }
        if(s.loop){var mlp=document.createElement('div'); mlp.className='mtr-loop';
          mlp.innerHTML='<span class="mtr-loop-ic">↻</span><span>'+decorate(s.loop)+'</span>'; w.appendChild(mlp);}
        if(s.vias && s.vias.length){
          var mcs=document.createElement('div'); mcs.className='mtr-cards';
          s.vias.forEach(function(via){
            var mc=document.createElement('div'); mc.className='mtr-card'+(via.key==='col'?' is-col':'');
            var li=(via.puntos||[]).map(function(x){return '<li>'+decorate(x).replace(/\*\*(.+?)\*\*/g,'<b>$1<\/b>')+'</li>';}).join('');
            mc.innerHTML='<div class="mtr-card-h"><span class="mtr-card-tag">'+esc(via.tag||'')+'</span><span class="mtr-card-t">'+esc(via.titulo||'')+'</span></div><ul class="mtr-card-list">'+li+'</ul>';
            mcs.appendChild(mc);
          });
          w.appendChild(mcs);
        }
        if(s.pie){var mft=document.createElement('div'); mft.className='mtr-foot';
          mft.innerHTML='<span class="bx-bar"></span><span>'+decorate(s.pie)+'</span>'; w.appendChild(mft);}
      }
      if(s.tipo==='matriz' && s.filas && s.filas.length){
        var mxw=document.createElement('div'); mxw.className='mtx-wrap';
        var tbl=document.createElement('table'); tbl.className='mtx';
        var thd=document.createElement('thead'); var hrow=document.createElement('tr');
        var corner=document.createElement('th'); corner.className='mtx-corner';
        corner.innerHTML='<span class="mtx-cl">'+esc(s.colLabel||'')+'</span><span class="mtx-rl">'+esc(s.rowLabel||'')+'</span>';
        hrow.appendChild(corner);
        (s.cols||[]).forEach(function(c){var th=document.createElement('th'); th.textContent=c; hrow.appendChild(th);});
        thd.appendChild(hrow); tbl.appendChild(thd);
        var tbd=document.createElement('tbody');
        s.filas.forEach(function(f){
          var tr=document.createElement('tr');
          var rh=document.createElement('th'); rh.className='mtx-rh'; rh.textContent=f.ag; tr.appendChild(rh);
          (f.celdas||[]).forEach(function(cel){
            var td=document.createElement('td'); td.className='lvl'+(cel.lvl||0); td.textContent=cel.t; tr.appendChild(td);
          });
          tbd.appendChild(tr);
        });
        tbl.appendChild(tbd); mxw.appendChild(tbl); w.appendChild(mxw);
        if(s.leyenda && s.leyenda.length){
          var lgd=document.createElement('div'); lgd.className='mtx-leg';
          s.leyenda.forEach(function(it){
            var sp=document.createElement('span'); sp.className='mtx-leg-it lvl'+(it.lvl||0);
            sp.innerHTML='<i></i>'+esc(it.txt); lgd.appendChild(sp);
          });
          w.appendChild(lgd);
        }
        if(s.pie){var mxf=document.createElement('div'); mxf.className='mtx-foot';
          mxf.innerHTML='<span class="bx-bar"></span><span>'+decorate(s.pie)+'</span>'; w.appendChild(mxf);}
      }
      if(s.bullets&&s.bullets.length){
        var content = ['vision','problema','mvp','modelo','equipo','riesgo','validacion','exit','cierre'].indexOf(s.tipo)>-1;
        if(content){ var gg=bulletsGrid(s.bullets); gg.className='grid'+(s.bullets.length===4?' g2':''); w.appendChild(gg); }
        else if((s.tipo==='mercado'||s.tipo==='solucion')&&s.bullets.length===3){ w.appendChild(bulletsGrid(s.bullets)); }
        else { w.appendChild(bulletsList(s.bullets)); }
      }
    }

    if(s.nota && s.nota.trim()){
      var nt=document.createElement('div'); nt.className='slide-nota';
      nt.innerHTML='<b>Nota del editor:</b> '+esc(s.nota);
      w.appendChild(nt);
    }

    art.appendChild(w);
    stage.appendChild(art);

    var dot=document.createElement('button'); dot.setAttribute('aria-label','Slide '+(i+1));
    dot.addEventListener('click',function(){go(i);});
    dotsWrap.appendChild(dot);
  });

  var els=Array.prototype.slice.call(document.querySelectorAll('.slide'));
  var dots=Array.prototype.slice.call(dotsWrap.children);
  var total=els.length, cur=0;
  document.getElementById('tot').textContent=n2(total);
  var prevBtn=document.querySelector('.nav.prev'), nextBtn=document.querySelector('.nav.next');

  function go(i){
    cur=Math.max(0,Math.min(total-1,i));
    els.forEach(function(e,k){e.classList.toggle('is-active',k===cur);});
    dots.forEach(function(d,k){d.classList.toggle('on',k===cur);});
    document.getElementById('progress').style.width=((cur+1)/total*100)+'%';
    document.getElementById('cur').textContent=n2(cur+1);
    prevBtn.disabled=cur===0; nextBtn.disabled=cur===total-1;
    try{ if(history.replaceState) history.replaceState(null,'','#s'+(cur+1)); }catch(_){}
  }
  function next(){go(cur+1);} function prev(){go(cur-1);}

  prevBtn.addEventListener('click',prev);
  nextBtn.addEventListener('click',next);
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key==='PageDown'||e.key===' '){e.preventDefault();next();}
    else if(e.key==='ArrowLeft'||e.key==='ArrowUp'||e.key==='PageUp'){e.preventDefault();prev();}
    else if(e.key==='Home'){go(0);} else if(e.key==='End'){go(total-1);}
    else if(e.key==='n'||e.key==='N'){document.body.classList.toggle('show-notas');}
    else if(e.key==='p'||e.key==='P'){window.print();}
  });
  // swipe en táctil
  var x0=null;
  stage.addEventListener('touchstart',function(e){x0=e.touches[0].clientX;},{passive:true});
  stage.addEventListener('touchend',function(e){
    if(x0===null)return; var dx=e.changedTouches[0].clientX-x0;
    if(Math.abs(dx)>50){dx<0?next():prev();} x0=null;
  },{passive:true});

  var start=parseInt((location.hash.match(/^#s(\d+)$/)||[])[1],10);
  go(isNaN(start)?0:start-1);
})();
</script>
</body>
</html>
